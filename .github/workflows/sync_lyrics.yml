name: Sync Lyrics from Firestore

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build release tag
        run: |
          # Data releases are intentionally separate from app versions. The same
          # tag is written into manifest.json and used for the GitHub Release so
          # mobile clients can construct stable release asset download URLs.
          echo "RELEASE_TAG=updates-v$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

      - name: Generate Sync Assets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: node scripts/sync_firestore_to_github.js

      - name: Commit Updated Manifest
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if [ -f manifest.json ]; then
            git add manifest.json
            git commit -m "Update manifest.json [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "manifest.json not found, skipping commit."
          fi

      - name: Create Release
        if: success() && hashFiles('output/manifest.json') != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: output/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Mark Firestore Published
        if: success() && hashFiles('output/published_docs.json') != ''
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: node scripts/mark_published.js
